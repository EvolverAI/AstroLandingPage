hero:
  title: Trasformare il Business attraverso l'IA
  subtitle: >-
    Crediamo in un mondo dove l'Intelligenza Artificiale semplifica la complessità, potenzia la creatività e guida
    un'innovazione significativa.
  description: Unitevi a noi nel plasmare il futuro delle soluzioni aziendali intelligenti.
about:
  companyName: Evolver
  companyNameHighlight: AI
  description: >
    In EvolverAI, ci specializziamo nello sviluppo di soluzioni intelligenti e  innovative che permettono alle aziende
    di prosperare nel moderno panorama digitale.  Integrando perfettamente l'Intelligenza Artificiale nei vostri
    processi aziendali,  vi aiutiamo a sbloccare nuovi livelli di efficienza, precisione e crescita.
brainstorming:
  companyName: Evolver
  companyNameHighlight: AI
  description: >
    In EvolverAI, vi aspettiamo per unirvi a noi nel viaggio dell'innovazione e della  crescita. Siamo qui per aiutarvi
    a sbloccare il potenziale dell'IA e trasformare  le vostre operazioni aziendali. Facciamo brainstorming insieme e
    creiamo un futuro  più luminoso per la vostra azienda.
services:
  title: Quello che facciamo
  description: Soluzioni complete di intelligenza artificiale su misura per le vostre esigenze aziendali
  cards:
    - title: Soluzioni IA Personalizzate
      description: Sistemi su misura che soddisfano i vostri requisiti aziendali unici.
    - title: Insights Basati sui Dati
      description: Analisi avanzate per trasformare i vostri dati in strategie attuabili.
    - title: Automazione Intelligente
      description: Flussi di lavoro ottimizzati e scalabili che crescono con la vostra azienda e riducono i costi operativi.
    - title: Outsourcing B2B
      description: >-
        Servizi completi che vi permettono di concentrarvi sulle competenze core mentre noi ci occupiamo dei processi
        specializzati.
      linkText: Scopri di più
divisions:
  title: Le Nostre Divisioni
  description: >
    EvolverAI è più di un'azienda — è un ecosistema multidisciplinare di innovazione.  Le nostre divisioni spaziano
    attraverso tecnologia all'avanguardia, sanità, ospitalità,  educazione, design digitale e servizi aziendali. Ogni
    unità opera con autonomia e focus,  eppure condivide lo stesso impegno: utilizzare intelligenza, creatività e
    precisione per  costruire il futuro. Esplorate come ogni divisione contribuisce alla nostra missione unificata.
  cards:
    - title: EvolverAI Tech
      description: >
        La nostra divisione tecnologica è il motore centrale che guida l'innovazione in EvolverAI.  Ci specializziamo
        nello sviluppo software personalizzato, sistemi di machine learning,  ingegneria dei dati e piattaforme IA
        scalabili su misura per le esigenze aziendali.  Che si tratti di infrastruttura cloud o analisi avanzate,
        EvolverAI Tech trasforma  la complessità in soluzioni intelligenti e utilizzabili.
      linkText: Scopri di più
    - title: EvolverAI Medical
      description: >
        All'intersezione tra sanità e intelligenza artificiale, EvolverAI Medical si impegna  a migliorare le vite.
        Sviluppiamo sistemi di supporto diagnostico, piattaforme dati  mediche e applicazioni IA centrate sul paziente
        che migliorano il processo decisionale  clinico, la ricerca e l'erogazione delle cure.
      linkText: Scopri di più
    - title: EvolverAI Hospitality
      description: >
        Unendo tecnologia ed esperienza umana, EvolverAI Hospitality porta soluzioni intelligenti  all'industria
        alberghiera e del tempo libero. Dai servizi per ospiti intelligenti e sistemi  di prenotazione all'automazione
        operativa e esperienza cliente potenziata dall'IA —  aiutiamo i fornitori di ospitalità a rimanere
        all'avanguardia.
      linkText: Scopri di più
    - title: EvolverAI BPO
      description: >
        EvolverAI BPO (Business Process Outsourcing) fornisce operazioni di supporto intelligenti  per aziende in tutto
        il mondo. Combiniamo automazione, esperienza umana e sistemi  scalabili per semplificare compiti come gestione
        dati, servizio clienti, moderazione  contenuti e flussi di lavoro amministrativi — con un forte focus su
        efficienza e qualità.
      linkText: Scopri di più
    - title: EvolverAI Academy
      description: >
        L'educazione alimenta il progresso. EvolverAI Academy offre corsi ad alto impatto,  workshop e programmi di
        mentoring in IA, data science e tecnologia. Potenziamo  individui e organizzazioni con competenze pratiche per
        prosperare in un mondo  digitale in rapido cambiamento — sia online che di persona.
      linkText: Scopri di più
    - title: PixelCraft by EvolverAI
      description: >
        PixelCraft è la nostra centrale creativa — un laboratorio di design dove l'arte  incontra l'intelligenza.
        Creiamo illustrazioni assistite dall'IA, pixel art,  kit di branding e contenuti visivi per giochi,
        merchandising e campagne digitali.  Lo spirito è giocoso, ma l'esecuzione è professionale.
      linkText: Scopri di più
features:
  title: 'EvolverAI: Ridefinire l''Eccellenza'
  cards:
    - title: Applicazioni IA Pratiche
      description: Fornire applicazioni IA pratiche che creano valore immediato.
    - title: Collaborazione con i Clienti
      description: Collaborare strettamente con i nostri clienti per comprendere le loro sfide e obiettivi.
    - title: Tecnologia Lungimirante
      description: Mantenere un approccio lungimirante alla tecnologia e all'innovazione.
b2b:
  title: Servizi di Outsourcing B2B
  description: >
    Soluzioni di outsourcing complete che vi permettono di concentrarvi sul vostro core business  mentre noi gestiamo i
    processi specializzati.
  buttonText: Collabora con Noi
  cards:
    - title: Gestione Infrastruttura IT
      description: Garantire prestazioni ottimali e sicurezza della vostra infrastruttura IT.
    - title: Elaborazione Dati e Analisi
      description: Trasformare dati grezzi in insights attuabili per decisioni informate.
    - title: Servizi di Supporto Clienti
      description: Fornire supporto reattivo ed efficace ai vostri clienti.
    - title: Automazione Processi Aziendali
      description: Semplificare e automatizzare i processi aziendali per maggiore efficienza.
products:
  title: Le nostre soluzioni pronte all'uso
  description: Queste sono le nostre soluzioni software progettate per affrontare le vostre sfide aziendali.
  cards:
    - title: Workforce Manager
      description: Uno strumento avanzato per semplificare la pianificazione dei turni e la gestione della forza lavoro.
      linkText: Scopri di più
    - title: Elysia
      description: Il vostro assistente potenziato dall'IA per una produttività migliorata.
      linkText: Scopri di più
product_wfm:
  subtitle: Workforce Manager
  description: >
    Workforce Manager è uno strumento avanzato progettato per semplificare la pianificazione  dei turni e la gestione
    della forza lavoro. Sfruttate il potere dell'IA e di un chatbot  automatizzato per comunicazione efficiente,
    programmazione e miglioramenti della produttività.
  buttonText: Dimmi di più
product_elysia:
  subtitle: 'Elysia: Il Vostro Assistente Potenziato dall''IA'
  description: >
    Elysia è più di un semplice bot—è il nuovo migliore amico della vostra organizzazione.  Alimentata dall'IA
    all'avanguardia, Elysia semplifica le operazioni automatizzando compiti  ripetitivi e riducendo i carichi di lavoro,
    dando al vostro team più tempo per concentrarsi  su ciò che conta davvero. Che si tratti di gestire flussi di
    lavoro, gestire query di routine  o ottimizzare processi, Elysia lavora instancabilmente dietro le quinte per
    aumentare  efficienza e produttività. Dite addio allo sforzo manuale e benvenuti a un modo più  intelligente e
    fluido di lavorare. Trasformate la vostra organizzazione con Elysia e  sbloccate il potenziale dell'IA oggi!
  buttonText: Scopri Elysia
