product_wfm:
  subtitle: Workforce Manager
  description: >
    Workforce Manager ist ein fortschrittliches Tool, das darauf ausgelegt ist, Schichtplanung  und Personalverwaltung
    zu optimieren. Nutzen Sie die Kraft der KI und eines automatisierten  Chatbots für effiziente Kommunikation,
    Terminplanung und Produktivitätssteigerungen.
  buttonText: Mehr erfahren
product_elysia:
  subtitle: 'Elysia: Ihr KI-gestützter Assistent'
  description: >
    Elysia ist mehr als nur ein Bot—sie ist der neue beste Freund Ihrer Organisation.  Angetrieben von hochmoderner KI
    optimiert Elysia Abläufe durch Automatisierung  wiederkehrender Aufgaben und Reduzierung von Arbeitslasten, wodurch
    Ihr Team mehr  Zeit hat, sich auf das zu konzentrieren, was wirklich wichtig ist. Ob es um die  Verwaltung von
    Workflows, die Bearbeitung routinemäßiger Anfragen oder die Optimierung  von Prozessen geht, Elysia arbeitet
    unermüdlich im Hintergrund, um Effizienz und  Produktivität zu steigern. Verabschieden Sie sich von manueller Arbeit
    und begrüßen  Sie eine intelligentere, nahtlosere Art zu arbeiten. Transformieren Sie Ihre Organisation  mit Elysia
    und erschließen Sie noch heute das Potenzial der KI!
  buttonText: Elysia entdecken
