hero:
  title: Geschäfte durch KI transformieren
  subtitle: >-
    Wir glauben an eine Welt, in der Künstliche Intelligenz Komplexität vereinfacht, Kreativität verstärkt und
    bedeutungsvolle Innovation vorantreibt.
  description: Schließen Sie sich uns an bei der Gestaltung der Zukunft intelligenter Geschäftslösungen.
about:
  companyName: Evolver
  companyNameHighlight: AI
  description: >
    Bei EvolverAI spezialisieren wir uns auf die Entwicklung intelligenter, innovativer  Lösungen, die Unternehmen dabei
    helfen, in der modernen digitalen Landschaft zu gedeihen.  Durch die nahtlose Integration von Künstlicher
    Intelligenz in Ihre Geschäftsprozesse  helfen wir Ihnen, neue Ebenen von Effizienz, Genauigkeit und Wachstum zu
    erschließen.
brainstorming:
  companyName: Evolver
  companyNameHighlight: AI
  description: >
    Bei EvolverAI warten wir darauf, dass Sie sich uns auf der Reise der Innovation und  des Wachstums anschließen. Wir
    sind hier, um Ihnen zu helfen, das Potenzial der KI  zu erschließen und Ihre Geschäftsabläufe zu transformieren.
    Lassen Sie uns gemeinsam  brainstormen und eine hellere Zukunft für Ihr Unternehmen schaffen.
services:
  title: Was wir tun
  description: Umfassende Lösungen für künstliche Intelligenz, maßgeschneidert für Ihre Geschäftsanforderungen
  cards:
    - title: Maßgeschneiderte KI-Lösungen
      description: Maßgeschneiderte Systeme, die Ihre einzigartigen Geschäftsanforderungen erfüllen.
    - title: Datengesteuerte Erkenntnisse
      description: Fortgeschrittene Analysen zur Umwandlung Ihrer Daten in umsetzbare Strategien.
    - title: Intelligente Automatisierung
      description: Optimierte, skalierbare Workflows, die mit Ihrem Unternehmen wachsen und Betriebskosten reduzieren.
    - title: B2B-Outsourcing
      description: >-
        Umfassende Services, die es Ihnen ermöglichen, sich auf Kernkompetenzen zu konzentrieren, während wir
        spezialisierte Prozesse übernehmen.
      linkText: Mehr erfahren
divisions:
  title: Unsere Bereiche
  description: >
    EvolverAI ist mehr als ein Unternehmen — es ist ein multidisziplinäres Innovationsökosystem.  Unsere Bereiche
    erstrecken sich über Spitzentechnologie, Gesundheitswesen, Gastgewerbe,  Bildung, digitales Design und
    Unternehmensdienstleistungen. Jede Einheit arbeitet autonom  und fokussiert, teilt aber dasselbe Engagement:
    Intelligenz, Kreativität und Präzision  zu nutzen, um die Zukunft zu gestalten. Entdecken Sie, wie jeder Bereich zu
    unserer  einheitlichen Mission beiträgt.
  cards:
    - title: EvolverAI Tech
      description: >
        Unsere Technologie-Abteilung ist der zentrale Motor, der Innovation bei EvolverAI  vorantreibt. Wir
        spezialisieren uns auf maßgeschneiderte Softwareentwicklung,  Machine Learning-Systeme, Datentechnik und
        skalierbare KI-Plattformen, die auf  Geschäftsanforderungen zugeschnitten sind. Ob Cloud-Infrastruktur oder
        fortgeschrittene  Analysen, EvolverAI Tech verwandelt Komplexität in intelligente, nutzbare Lösungen.
      linkText: Mehr erfahren
    - title: EvolverAI Medical
      description: >
        An der Schnittstelle zwischen Gesundheitswesen und künstlicher Intelligenz engagiert  sich EvolverAI Medical für
        die Verbesserung von Leben. Wir entwickeln diagnostische  Unterstützungssysteme, medizinische Datenplattformen
        und patientenzentrierte KI-Anwendungen,  die klinische Entscheidungsfindung, Forschung und Versorgung
        verbessern.
      linkText: Mehr erfahren
    - title: EvolverAI Hospitality
      description: >
        Durch die Verbindung von Technologie und menschlicher Erfahrung bringt EvolverAI  Hospitality intelligente
        Lösungen in die Hotel- und Freizeitbranche. Von intelligenten  Gästeservices und Reservierungssystemen bis hin
        zu operativer Automatisierung und  KI-gestützter Kundenerfahrung — wir helfen Gastgewerbeanbietern, der Kurve
        voraus zu bleiben.
      linkText: Mehr erfahren
    - title: EvolverAI BPO
      description: >
        EvolverAI BPO (Business Process Outsourcing) liefert intelligente Support-Operationen  für Unternehmen weltweit.
        Wir kombinieren Automatisierung, menschliche Expertise und  skalierbare Systeme, um Aufgaben wie
        Datenmanagement, Kundenservice, Content-Moderation  und administrative Workflows zu rationalisieren — mit
        starkem Fokus auf Effizienz und Qualität.
      linkText: Mehr erfahren
    - title: EvolverAI Academy
      description: >
        Bildung treibt Fortschritt an. EvolverAI Academy bietet hochwertige Kurse, Workshops  und Mentoring-Programme in
        KI, Data Science und Technologie. Wir befähigen Einzelpersonen  und Organisationen mit praktischen Fähigkeiten,
        in einer sich schnell wandelnden  digitalen Welt zu gedeihen — sowohl online als auch persönlich.
      linkText: Mehr erfahren
    - title: PixelCraft by EvolverAI
      description: >
        PixelCraft ist unser kreatives Kraftwerk — ein Design-Labor, wo Kunst auf Intelligenz  trifft. Wir erstellen
        KI-gestützte Illustrationen, Pixel Art, Branding-Kits und  visuelle Inhalte für Spiele, Merchandise und digitale
        Kampagnen. Der Geist ist  spielerisch, aber die Ausführung ist professionell.
      linkText: Mehr erfahren
