# Academy page layout - section order, types, and non-translatable config
page_sections:
  - type: "content_header"
    section_id: "about"
    order: 1
    background_image: "/img/evolverai-web-brainstorming-bg.jpg"
  - type: "cards"
    section_id: "overview"
    order: 2
  - type: "cards"
    section_id: "learning-approach"
    order: 2.1
  - type: "cards"
    section_id: "courses"
    order: 3
  - type: "cards"
    section_id: "benefits"
    order: 4
  - type: "cards"
    section_id: "delivery-methods"
    order: 5
  - type: "cards"
    section_id: "enrollment"
    order: 6
    background_image: "/img/evolverai-web-company-bg.jpg"
  - type: "content_header"
    section_id: "contact"
    order: 99
    background_image: "/img/evolverai-web-contact-bg.jpg"

defaults:
  cards:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 3
    icon:
      type: "default"
      alignment: "left"
      size: "text-lg"
    margin: "mb-4"
    padding: "p-12"
    colors:
      background: "bg-slate-800"
      border: "border-2 border-blue-700"
    title:
      text: "text-2xl"
      weight: "font-semibold"
      color: "text-blue-300"
      size: "text-lg"
    content:
      text: "text-md"
      weight: "font-normal"
      color: "text-gray-300"
      size: "text-md"
    feature:
      text: "text-md"
      weight: "font-normal"
      color: "text-gray-200"
      size: "text-md"
      bullet: "check"
      bulletType: "icon"
      bulletColor: "text-green-400"
      bulletSize: "text-xl"

section_config:
  overview:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 2
    cards:
      - icon: { type: "trending_up", alignment: "left", color: "text-blue-400" }
        features_config:
          - { bullet: "analytics", bulletType: "icon", bulletColor: "text-blue-400" }
          - { bullet: "business_center", bulletType: "icon", bulletColor: "text-green-400" }
          - { bullet: "attach_money", bulletType: "icon", bulletColor: "text-yellow-400" }
          - { bullet: "diversity_3", bulletType: "icon", bulletColor: "text-purple-400" }
      - icon: { type: "school", alignment: "left", color: "text-green-500" }
        features_config:
          - { bullet: "check", bulletType: "icon", bulletColor: "text-green-400" }
          - { bullet: "check", bulletType: "icon", bulletColor: "text-green-400" }
          - { bullet: "check", bulletType: "icon", bulletColor: "text-green-400" }
          - { bullet: "check", bulletType: "icon", bulletColor: "text-green-400" }
  learning-approach:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { type: "build", alignment: "left-big" }
  courses:
    cards:
      - icon: { type: "lightbulb", alignment: "left" }
      - icon: { type: "precision_manufacturing", alignment: "left" }
      - icon: { type: "psychology", alignment: "left" }
      - icon: { type: "business_center", alignment: "left" }
      - icon: { type: "visibility", alignment: "left" }
      - icon: { type: "chat", alignment: "left" }
  benefits:
    responsiveColumns:
      mobile: 1
      tablet: 3
      desktop: 3
    alignment: "center"
    cards:
      - icon: { type: "trending_up", alignment: "top-big" }
      - icon: { type: "build", alignment: "top-big" }
      - icon: { type: "support_agent", alignment: "top-big" }
  delivery-methods:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 4
    cards:
      - icon: { type: "video_call", alignment: "top" }
      - icon: { type: "schedule", alignment: "top" }
      - icon: { type: "sync", alignment: "top" }
      - icon: { type: "groups", alignment: "top" }
  enrollment:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { type: "school", alignment: "left-big" }
        background: "bg-gradient-to-r from-blue-900 to-slate-800 rounded-lg"
        buttonUrl: "/enroll-courses"
