# B2B page layout - section order, types, and non-translatable config
page_sections:
  - type: "content_header"
    section_id: "about"
    order: 1
    background_image: "/img/evolverai-web-company-bg.jpg"
  - type: "cards"
    section_id: "company-background"
    order: 2
  - type: "cards"
    section_id: "leadership"
    order: 4
  - type: "cards"
    section_id: "team-structure"
    order: 5
  - type: "cards"
    section_id: "operation-manager"
    order: 5.1
  - type: "cards"
    section_id: "support-structure"
    order: 5.2
  - type: "cards"
    section_id: "integrated-approach"
    order: 5.3
  - type: "cards"
    section_id: "location-infrastructure"
    order: 6
  - type: "cards"
    section_id: "scalability"
    order: 6.1
  - type: "cards"
    section_id: "compliance-security"
    order: 7
  - type: "cards"
    section_id: "data-privacy"
    order: 7.1
  - type: "cards"
    section_id: "operational-complexity"
    order: 8
  - type: "cards"
    section_id: "partnership"
    order: 8.1
    background_image: "/img/evolverai-web-company-bg.jpg"
  - type: "content_header"
    section_id: "contact"
    order: 99
    background_image: "/img/evolverai-web-contact-bg.jpg"

defaults:
  cards:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 3
    icon:
      type: "default"
      alignment: "left"
      size: "text-lg"
      background:
        color: "bg-gray-100"
        style: "rounded-lg shadow-md"
    margin: "mb-4"
    padding: "p-12"
    colors:
      background: "bg-slate-800"
      border: "border-2 border-blue-700"
    title:
      text: "text-2xl"
      weight: "font-semibold"
      color: "text-blue-300"
      size: "text-lg"
    content:
      text: "text-md"
      weight: "font-normal"
      color: "text-gray-300"
      size: "text-md"
    feature:
      text: "text-md"
      weight: "font-normal"
      color: "text-gray-200"
      size: "text-md"
      bullet: "check"
      bulletType: "icon"
      bulletColor: "text-green-400"
      bulletSize: "text-xl"

section_config:
  company-background:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { image: "/img/InfiniteWorkforceLogo.png", alignment: "top-big" }
  leadership:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 2
    background: "bg-gradient-to-r from-blue-900 to-slate-800 rounded-lg"
    cards:
      - icon: { type: "insights", alignment: "left-big" }
      - icon: { type: "verified", alignment: "left-big" }
  operation-manager:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 4
    cards:
      - icon: { type: "speed", alignment: "top-big" }
      - icon: { type: "forum", alignment: "top-big" }
      - icon: { type: "shield", alignment: "top-big" }
      - icon: { type: "group", alignment: "top-big" }
  support-structure:
    responsiveColumns:
      mobile: 1
      tablet: 3
      desktop: 3
    cards:
      - icon: { type: "computer", alignment: "top-big" }
      - icon: { type: "people", alignment: "top-big" }
      - icon: { type: "account_balance", alignment: "top-big" }
  integrated-approach:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { type: "insights", alignment: "left-big" }
  location-infrastructure:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 2
    cards:
      - icon: { type: "location_on", alignment: "left" }
      - icon: { type: "security", alignment: "left" }
  scalability:
    cards:
      - icon: { type: "group_add", alignment: "left" }
      - icon: { type: "tune", alignment: "left" }
      - icon: { type: "expand_more", alignment: "left" }
  compliance-security:
    responsiveColumns:
      mobile: 1
      tablet: 2
      desktop: 2
    cards:
      - icon: { type: "gpp_good", alignment: "left" }
      - icon: { type: "policy", alignment: "left" }
      - icon: { type: "gpp_good", alignment: "left" }
      - icon: { type: "settings_applications", alignment: "left" }
  data-privacy:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { type: "enhanced_encryption", alignment: "left" }
      - icon: { type: "data_usage", alignment: "left" }
      - icon: { type: "report_problem", alignment: "left" }
      - icon: { type: "settings_applications", alignment: "left" }
  operational-complexity:
    responsiveColumns:
      mobile: 1
      tablet: 3
      desktop: 3
    cards:
      - icon: { type: "monetization_on", alignment: "top" }
      - icon: { type: "precision_manufacturing", alignment: "top" }
      - icon: { type: "rocket_launch", alignment: "top" }
  partnership:
    responsiveColumns:
      mobile: 1
      tablet: 1
      desktop: 1
    cards:
      - icon: { type: "savings", alignment: "left-big" }
        background: "bg-gradient-to-r from-blue-900 to-slate-800 rounded-lg"
        buttonUrl: "/schedule-b2b-consultation"
