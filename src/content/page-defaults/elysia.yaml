cards:
  responsiveColumns:
    mobile: 1
    tablet: 2
    desktop: 3
  icon:
    type: default
    alignment: left
    size: text-lg
  margin: mb-4
  padding: p-12
  colors:
    background: bg-slate-800
    border: border-2 border-blue-700
  title:
    text: text-lg
    weight: font-semibold
    color: text-blue-300
    size: text-lg
  content:
    text: text-lg
    weight: font-normal
    color: text-gray-300
    size: text-md
  feature:
    text: text-sm
    weight: font-normal
    color: text-gray-600
    bullet: check
    bulletType: icon
    bulletColor: text-green-400
