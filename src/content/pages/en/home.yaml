meta:
  title: EvolverAI - Integrated AI Solutions
  description: >-
    Discover EvolverAI, your trusted partner for cutting-edge IT and AI solutions. We deliver innovative software,
    expert consultancy, and tailored services to drive your success.
sections:
  - discriminant: hero
    value:
      id: hero
      companyName: Evolver
      companyNameHighlight: AI
      title: Transforming Business Through AI
      subtitle: >-
        We believe in a world where Artificial Intelligence simplifies complexity, enhances creativity, and drives
        meaningful innovation.
      description: Join us in shaping the future of intelligent business solutions.
      minHeight: 100vh
  - discriminant: logo_strip
    value:
      id: clients
      title: Trusted by leading organizations
      scrolling: true
      logos:
        - src: /img/clients/nielsen.png
          alt: Nielsen
          url: https://www.nielsen.com
        - src: /img/clients/centro.png
          alt: Centro Pediatrico del Mendrisiotto
          url: https://centropediatrico.ch
        - src: /img/clients/arbed.png
          alt: Arbed Living Hotel
          url: https://arbedlivinghotel.ch
  - discriminant: content_header
    value:
      id: about
      description: >
        At EvolverAI, we specialize in developing smart, innovative solutions that empower companies to thrive in the
        modern digital landscape. By seamlessly  integrating Artificial Intelligence into your business processes, we
        help  you unlock new levels of efficiency, accuracy, and growth.
      companyName: Evolver
      companyNameHighlight: AI
      backgroundImage: /img/evolverai-web-company-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: cards
    value:
      id: services
      title: What we do
      description: Comprehensive artificial intelligence solutions tailored to your business needs
      cards:
        - title: Customized AI Solutions
          description: Tailored systems that meet your unique business requirements.
          icon:
            type: star
            alignment: top
        - title: Data-Driven Insights
          description: Advanced analytics to transform your data into actionable strategies.
          icon:
            type: star
            alignment: top
        - title: Intelligent Automation
          description: Optimized, scalable workflows that grow with your business and reduce operational costs.
          icon:
            type: psychology
            alignment: top
            color: text-blue-400
        - title: B2B Outsourcing
          description: >-
            Comprehensive services that allow you to focus on core competencies while we take care of specialized
            processes.
          linkText: Learn More
          icon:
            type: handshake
            alignment: top
            color: text-blue-400
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 4
  - discriminant: cards
    value:
      id: divisions
      title: Our Divisions
      description: >
        EvolverAI is more than a company — it's a multidisciplinary ecosystem of innovation.  Our divisions span across
        cutting-edge technology, healthcare, hospitality, education,  digital design, and business services. Each unit
        operates with autonomy and focus,  yet shares the same commitment: using intelligence, creativity, and precision
        to build  the future. Explore how each division contributes to our unified mission.
      cards:
        - title: EvolverAI Tech
          description: >
            Our technology division is the core engine driving innovation at EvolverAI.  We specialize in custom
            software development, machine learning systems, data  engineering, and scalable AI platforms tailored to
            business needs. Whether it's  cloud infrastructure or advanced analytics, EvolverAI Tech turns complexity 
            into smart, usable solutions.
          linkText: Learn More
          icon:
            type: computer
            alignment: left-headline
          linkUrl: /tech
        - title: EvolverAI Medical
          description: >
            At the intersection of healthcare and artificial intelligence, EvolverAI Medical  is committed to improving
            lives. We develop diagnostic support systems, medical  data platforms, and patient-centric AI applications
            that enhance clinical decision-making,  research, and care delivery.
          linkText: Learn More
          icon:
            type: health_and_safety
            alignment: left-headline
          linkUrl: /medical
        - title: EvolverAI Hospitality
          description: >
            Merging technology with human experience, EvolverAI Hospitality brings intelligent  solutions to the hotel
            and leisure industry. From smart guest services and  reservation systems to operational automation and
            AI-enhanced customer experience —  we help hospitality providers stay ahead of the curve.
          linkText: Learn More
          icon:
            type: room_service
            alignment: left-headline
          linkUrl: /hospitality
        - title: EvolverAI BPO
          description: >
            EvolverAI BPO (Business Process Outsourcing) delivers intelligent support  operations for companies
            worldwide. We combine automation, human expertise,  and scalable systems to streamline tasks like data
            management, customer  service, content moderation, and administrative workflows — with a strong  focus on
            efficiency and quality.
          linkText: Learn More
          icon:
            type: business
            alignment: left-headline
          linkUrl: /b2b
        - title: EvolverAI Academy
          description: >
            Education fuels progress. EvolverAI Academy offers high-impact courses,  workshops, and mentorship programs
            in AI, data science, and technology.  We empower individuals and organizations with practical skills to
            thrive  in a rapidly changing digital world — both online and in-person.
          linkText: Learn More
          icon:
            type: school
            alignment: left-headline
            color: '#F5F5F5'
          linkUrl: /academy
        - title: PixelCraft by EvolverAI
          description: >
            PixelCraft is our creative powerhouse — a design lab where art meets intelligence.  We craft AI-assisted
            illustrations, pixel art, branding kits, and visual content  for games, merch, and digital campaigns. The
            spirit is playful, but the execution  is professional.
          linkText: Learn More
          icon:
            type: palette
            alignment: left-headline
          linkUrl: /pixelcraft
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 2
      cardVariant: glass
  - discriminant: content_header
    value:
      id: brainstorming
      description: >
        At EvolverAI, we are waiting for you to join us in the journey of innovation  and growth. We are here to help
        you unlock the potential of AI and transform  your business operations. Let's brainstorm together and create a
        brighter future  for your company.
      companyName: Evolver
      companyNameHighlight: AI
      backgroundImage: /img/evolverai-web-brainstorming-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: cards
    value:
      id: features
      title: 'EvolverAI: Redefining Excellence'
      cards:
        - title: Practical AI Applications
          description: Delivering practical AI applications that create immediate value.
          icon:
            type: check_circle
            alignment: top
        - title: Client Collaboration
          description: Collaborating closely with our clients to understand their challenges and goals.
          icon:
            type: handshake
            alignment: top
        - title: Forward-Thinking Technology
          description: Maintaining a forward-thinking approach to technology and innovation.
          icon:
            type: lightbulb
            alignment: top
      responsiveColumns:
        mobile: 1
        tablet: 3
        desktop: 3
  - discriminant: cards
    value:
      id: b2b
      title: B2B Outsourcing Services
      description: >
        Comprehensive outsourcing solutions that let you focus on your core business while  we handle specialized
        processes.
      cards:
        - title: IT Infrastructure Management
          description: Ensuring optimal performance and security of your IT infrastructure.
          icon:
            type: tune
            alignment: top
        - title: Data Processing & Analytics
          description: Transforming raw data into actionable insights for informed decision-making.
          icon:
            type: expand_more
            alignment: top
        - title: Customer Support Services
          description: Providing responsive and effective support to your customers.
          icon:
            type: business
            alignment: top
        - title: Business Process Automation
          description: Streamlining and automating business processes for increased efficiency.
          icon:
            type: autorenew
            alignment: top
      buttonText: Partner with Us
      buttonUrl: /b2b
      buttonColor: bg-green-600 hover:bg-green-700
      responsiveColumns:
        mobile: 1
        tablet: 4
        desktop: 4
  - discriminant: cards
    value:
      id: products
      title: Our ready made solutions
      description: These are our software solutions designed to address your business challenges.
      cards:
        - title: Workforce Manager
          description: An advanced tool for streamlining shift planning and workforce management.
          linkText: Learn More
          icon:
            type: clock
            alignment: top
          linkUrl: '#product_wfm'
        - title: Elysia
          description: Your AI-powered assistant for enhanced productivity.
          linkText: Learn More
          icon:
            type: assistant
            alignment: top
          linkUrl: '#product_elysia'
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 2
  - discriminant: product
    value:
      id: product_wfm
      subtitle: Workforce Manager
      description: >
        Workforce Manager is an advanced tool designed to streamline shift planning  and workforce management. Harness
        the power of AI and an automated chatbot for  efficient communication, scheduling, and productivity
        enhancements.
      buttonText: Tell me more
      buttonUrl: /wfm
      buttonColor: bg-purple-600 hover:bg-purple-700
      image: /img/evolverai-web-wfm-bg.png
      imagePosition: right
  - discriminant: product
    value:
      id: product_elysia
      subtitle: 'Elysia: Your AI-Powered Assistant'
      description: >
        Elysia is more than just a bot—it's your organization's new best friend. Powered by  cutting-edge AI, Elysia
        streamlines operations by automating repetitive tasks and  reducing workloads, giving your team more time to
        focus on what truly matters. Whether  it's managing workflows, handling routine queries, or optimizing
        processes, Elysia works  tirelessly behind the scenes to boost efficiency and productivity. Say goodbye to
        manual  effort and hello to a smarter, more seamless way of working. Transform your organization  with Elysia
        and unlock the potential of AI today!
      buttonText: Discover Elysia
      buttonUrl: /elysia
      buttonColor: bg-pink-600 hover:bg-pink-700
      image: /img/evolverai-web-elysia-bg.jpg
      imagePosition: left
  - discriminant: cards
    value:
      id: courses
      title: AI Courses & Training
      description: Enhance your skills with our comprehensive AI and data science courses.
      cards:
        - title: AI Fundamentals
          description: Learn the basics of artificial intelligence and its applications.
          features:
            - text: What is a LLM (Large Language Model)
              bullet: psychology
              bulletType: icon
              bulletColor: text-blue-400
              badges:
                - text: New
                  color: bg-blue-500
                  tooltip: Recently Added
            - text: Key concepts in prompt engineering
              bullet: edit
              bulletType: icon
              bulletColor: text-green-400
              badges:
                - text: Core
                  color: bg-green-500
                  tooltip: Core Concept
            - text: Generative AI and its applications
              bullet: auto_awesome
              bulletType: icon
              bulletColor: text-purple-400
              badges:
                - text: Popular
                  color: bg-purple-500
                  tooltip: Most Popular Topic
          buttonText: Enroll now
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-fundamentals
          buttonColor: bg-indigo-600 hover:bg-indigo-700
        - title: Machine Learning Mastery
          description: Advanced techniques in machine learning and data science.
          features:
            - text: Deep learning and neural networks
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Expert
                  color: bg-green-400
                  tooltip: Mastery Badge
            - text: Advanced algorithms and model optimization
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Expert
                  color: bg-green-400
                  tooltip: Mastery Badge
            - text: Real-world project implementation
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Expert
                  color: bg-green-400
                  tooltip: Mastery Badge
          buttonText: Enroll now
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-machine-learning
        - title: AI Ethics & Governance
          description: Understanding the ethical implications and governance of AI systems.
          features:
            - text: Ethical frameworks for AI development
              bulletType: dot
              bulletColor: text-red-400
              badges:
                - text: Ethics
                  color: bg-red-500
                  tooltip: Ethics Certified
            - text: Bias detection and mitigation strategies
              bulletType: dot
              bulletColor: text-yellow-400
              badges:
                - text: Advanced
                  color: bg-yellow-500
                  tooltip: Advanced Level
            - text: Regulatory compliance and best practices
              bulletType: dot
              bulletColor: text-green-400
              badges:
                - text: Compliance
                  color: bg-green-500
                  tooltip: Compliance Ready
          buttonText: Enroll now
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-ethics-governance
          badges:
            - text: 4 hours
              color: bg-red-500
              tooltip: Your first course
      buttonUrl: /enroll/ai-fundamentals
      buttonColor: bg-indigo-600 hover:bg-indigo-700
      responsiveColumns:
        mobile: 1
        tablet: 3
        desktop: 3
      cardVariant: glass
  - discriminant: content_header
    value:
      id: contact
      title: Get in Touch
      description: Ready to transform your business with AI? Let's discuss your project.
      backgroundImage: /img/evolverai-web-contact-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: blog
    value:
      id: blog
      title: Latest News & Insights
      description: Thoughts, updates and stories from our team.
      maxPosts: 6
      buttonText: Read all articles
  - discriminant: testimonials
    value:
      id: '111'
      title: What Our Clients Say
      description: ''
      testimonials:
        - quote: EvolverAI transformed how we work. Highly recommended.
          name: Jane Smith
          role: CEO
          company: Acme Corp
          rating: 5
      visible: false
  - discriminant: pricing
    value:
      id: ppp
      title: Pricing
      description: ''
      plans:
        - name: Starter
          price: Free
          features:
            - Feature 1
            - Feature 2
          cta: Get Started
          ctaUrl: '#'
        - name: Pro
          price: €49
          period: mo
          features:
            - Everything in Starter
            - Priority support
          cta: Start Free Trial
          ctaUrl: '#'
          highlighted: true
          badge: Most Popular
