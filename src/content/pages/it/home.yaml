meta:
  title: EvolverAI - Soluzioni AI Integrate
  description: >-
    Scopri EvolverAI, il tuo partner di fiducia per soluzioni IT e AI all'avanguardia. Offriamo software innovativo,
    consulenza esperta e servizi su misura per il tuo successo.
sections:
  - discriminant: hero
    value:
      id: hero
      title: Trasformare il Business attraverso l'IA
      subtitle: >-
        Crediamo in un mondo dove l'Intelligenza Artificiale semplifica la complessità, potenzia la creatività e guida
        un'innovazione significativa.
      description: Unitevi a noi nel plasmare il futuro delle soluzioni aziendali intelligenti.
      minHeight: 100vh
  - discriminant: logo_strip
    value:
      id: clients
      title: Hanno scelto EvolverAI
      scrolling: true
      logos:
        - src: /img/clients/nielsen.png
          alt: Nielsen
          url: https://www.nielsen.com
        - src: /img/clients/centro.png
          alt: Centro Pediatrico del Mendrisiotto
          url: https://centropediatrico.ch
        - src: /img/clients/arbed.png
          alt: Arbed Living Hotel
          url: https://arbedlivinghotel.ch
        - src: /img/clients/swissoak.png
          alt: Swiss Oak Advisory
          url: https://swissoak.net
  - discriminant: content_header
    value:
      id: about
      description: >
        In EvolverAI, ci specializziamo nello sviluppo di soluzioni intelligenti e  innovative che permettono alle
        aziende di prosperare nel moderno panorama digitale.  Integrando perfettamente l'Intelligenza Artificiale nei
        vostri processi aziendali,  vi aiutiamo a sbloccare nuovi livelli di efficienza, precisione e crescita.
      companyName: Evolver
      companyNameHighlight: AI
      backgroundImage: /img/evolverai-web-company-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: cards
    value:
      id: services
      title: Quello che facciamo
      description: Soluzioni complete di intelligenza artificiale su misura per le vostre esigenze aziendali
      cards:
        - title: Soluzioni IA Personalizzate
          description: Sistemi su misura che soddisfano i vostri requisiti aziendali unici.
          icon:
            type: star
            alignment: top
        - title: Insights Basati sui Dati
          description: Analisi avanzate per trasformare i vostri dati in strategie attuabili.
          icon:
            type: star
            alignment: top
        - title: Automazione Intelligente
          description: Flussi di lavoro ottimizzati e scalabili che crescono con la vostra azienda e riducono i costi operativi.
          icon:
            type: psychology
            alignment: top
            color: text-blue-400
        - title: Outsourcing B2B
          description: >-
            Servizi completi che vi permettono di concentrarvi sulle competenze core mentre noi ci occupiamo dei
            processi specializzati.
          linkText: Scopri di più
          icon:
            type: handshake
            alignment: top
            color: text-blue-400
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 4
  - discriminant: cards
    value:
      id: divisions
      title: Le Nostre Divisioni
      description: >
        EvolverAI è più di un'azienda — è un ecosistema multidisciplinare di innovazione.  Le nostre divisioni spaziano
        attraverso tecnologia all'avanguardia, sanità, ospitalità,  educazione, design digitale e servizi aziendali.
        Ogni unità opera con autonomia e focus,  eppure condivide lo stesso impegno: utilizzare intelligenza, creatività
        e precisione per  costruire il futuro. Esplorate come ogni divisione contribuisce alla nostra missione
        unificata.
      cards:
        - title: EvolverAI Tech
          description: >
            La nostra divisione tecnologica è il motore centrale che guida l'innovazione in EvolverAI.  Ci
            specializziamo nello sviluppo software personalizzato, sistemi di machine learning,  ingegneria dei dati e
            piattaforme IA scalabili su misura per le esigenze aziendali.  Che si tratti di infrastruttura cloud o
            analisi avanzate, EvolverAI Tech trasforma  la complessità in soluzioni intelligenti e utilizzabili.
          linkText: Scopri di più
          icon:
            type: computer
            alignment: left-headline
          linkUrl: /tech
        - title: EvolverAI Medical
          description: >
            All'intersezione tra sanità e intelligenza artificiale, EvolverAI Medical si impegna  a migliorare le vite.
            Sviluppiamo sistemi di supporto diagnostico, piattaforme dati  mediche e applicazioni IA centrate sul
            paziente che migliorano il processo decisionale  clinico, la ricerca e l'erogazione delle cure.
          linkText: Scopri di più
          icon:
            type: health_and_safety
            alignment: left-headline
          linkUrl: /medical
        - title: EvolverAI Hospitality
          description: >
            Unendo tecnologia ed esperienza umana, EvolverAI Hospitality porta soluzioni intelligenti  all'industria
            alberghiera e del tempo libero. Dai servizi per ospiti intelligenti e sistemi  di prenotazione
            all'automazione operativa e esperienza cliente potenziata dall'IA —  aiutiamo i fornitori di ospitalità a
            rimanere all'avanguardia.
          linkText: Scopri di più
          icon:
            type: room_service
            alignment: left-headline
          linkUrl: /hospitality
        - title: EvolverAI BPO
          description: >
            EvolverAI BPO (Business Process Outsourcing) fornisce operazioni di supporto intelligenti  per aziende in
            tutto il mondo. Combiniamo automazione, esperienza umana e sistemi  scalabili per semplificare compiti come
            gestione dati, servizio clienti, moderazione  contenuti e flussi di lavoro amministrativi — con un forte
            focus su efficienza e qualità.
          linkText: Scopri di più
          icon:
            type: business
            alignment: left-headline
          linkUrl: /b2b
        - title: EvolverAI Academy
          description: >
            L'educazione alimenta il progresso. EvolverAI Academy offre corsi ad alto impatto,  workshop e programmi di
            mentoring in IA, data science e tecnologia. Potenziamo  individui e organizzazioni con competenze pratiche
            per prosperare in un mondo  digitale in rapido cambiamento — sia online che di persona.
          linkText: Scopri di più
          icon:
            type: school
            alignment: left-headline
            color: '#F5F5F5'
          linkUrl: /academy
        - title: PixelCraft by EvolverAI
          description: >
            PixelCraft è la nostra centrale creativa — un laboratorio di design dove l'arte  incontra l'intelligenza.
            Creiamo illustrazioni assistite dall'IA, pixel art,  kit di branding e contenuti visivi per giochi,
            merchandising e campagne digitali.  Lo spirito è giocoso, ma l'esecuzione è professionale.
          linkText: Scopri di più
          icon:
            type: palette
            alignment: left-headline
          linkUrl: /pixelcraft
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 2
      cardVariant: glass
  - discriminant: content_header
    value:
      id: brainstorming
      description: >
        In EvolverAI, vi aspettiamo per unirvi a noi nel viaggio dell'innovazione e della  crescita. Siamo qui per
        aiutarvi a sbloccare il potenziale dell'IA e trasformare  le vostre operazioni aziendali. Facciamo brainstorming
        insieme e creiamo un futuro  più luminoso per la vostra azienda.
      companyName: Evolver
      companyNameHighlight: AI
      backgroundImage: /img/evolverai-web-brainstorming-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: cards
    value:
      id: features
      title: 'EvolverAI: Ridefinire l''Eccellenza'
      cards:
        - title: Applicazioni IA Pratiche
          description: Fornire applicazioni IA pratiche che creano valore immediato.
          icon:
            type: check_circle
            alignment: top
        - title: Collaborazione con i Clienti
          description: Collaborare strettamente con i nostri clienti per comprendere le loro sfide e obiettivi.
          icon:
            type: handshake
            alignment: top
        - title: Tecnologia Lungimirante
          description: Mantenere un approccio lungimirante alla tecnologia e all'innovazione.
          icon:
            type: lightbulb
            alignment: top
      responsiveColumns:
        mobile: 1
        tablet: 3
        desktop: 3
  - discriminant: cards
    value:
      id: b2b
      title: Servizi di Outsourcing B2B
      description: >
        Soluzioni di outsourcing complete che vi permettono di concentrarvi sul vostro core business  mentre noi
        gestiamo i processi specializzati.
      cards:
        - title: Gestione Infrastruttura IT
          description: Garantire prestazioni ottimali e sicurezza della vostra infrastruttura IT.
          icon:
            type: tune
            alignment: top
        - title: Elaborazione Dati e Analisi
          description: Trasformare dati grezzi in insights attuabili per decisioni informate.
          icon:
            type: expand_more
            alignment: top
        - title: Servizi di Supporto Clienti
          description: Fornire supporto reattivo ed efficace ai vostri clienti.
          icon:
            type: business
            alignment: top
        - title: Automazione Processi Aziendali
          description: Semplificare e automatizzare i processi aziendali per maggiore efficienza.
          icon:
            type: autorenew
            alignment: top
      buttonText: Collabora con Noi
      buttonUrl: /b2b
      buttonColor: bg-green-600 hover:bg-green-700
      responsiveColumns:
        mobile: 1
        tablet: 4
        desktop: 4
  - discriminant: cards
    value:
      id: products
      title: Le nostre soluzioni pronte all'uso
      description: Queste sono le nostre soluzioni software progettate per affrontare le vostre sfide aziendali.
      cards:
        - title: Workforce Manager
          description: Uno strumento avanzato per semplificare la pianificazione dei turni e la gestione della forza lavoro.
          linkText: Scopri di più
          icon:
            type: clock
            alignment: top
          linkUrl: '#product_wfm'
        - title: Elysia
          description: Il vostro assistente potenziato dall'IA per una produttività migliorata.
          linkText: Scopri di più
          icon:
            type: assistant
            alignment: top
          linkUrl: '#product_elysia'
      responsiveColumns:
        mobile: 1
        tablet: 2
        desktop: 2
  - discriminant: product
    value:
      id: product_wfm
      subtitle: Workforce Manager
      description: >
        Workforce Manager è uno strumento avanzato progettato per semplificare la pianificazione  dei turni e la
        gestione della forza lavoro. Sfruttate il potere dell'IA e di un chatbot  automatizzato per comunicazione
        efficiente, programmazione e miglioramenti della produttività.
      buttonText: Dimmi di più
      buttonUrl: /wfm
      buttonColor: bg-purple-600 hover:bg-purple-700
      image: /img/evolverai-web-wfm-bg.png
      imagePosition: right
  - discriminant: product
    value:
      id: product_elysia
      subtitle: 'Elysia: Il Vostro Assistente Potenziato dall''IA'
      description: >
        Elysia è più di un semplice bot—è il nuovo migliore amico della vostra organizzazione.  Alimentata dall'IA
        all'avanguardia, Elysia semplifica le operazioni automatizzando compiti  ripetitivi e riducendo i carichi di
        lavoro, dando al vostro team più tempo per concentrarsi  su ciò che conta davvero. Che si tratti di gestire
        flussi di lavoro, gestire query di routine  o ottimizzare processi, Elysia lavora instancabilmente dietro le
        quinte per aumentare  efficienza e produttività. Dite addio allo sforzo manuale e benvenuti a un modo più 
        intelligente e fluido di lavorare. Trasformate la vostra organizzazione con Elysia e  sbloccate il potenziale
        dell'IA oggi!
      buttonText: Scopri Elysia
      buttonUrl: /elysia
      buttonColor: bg-pink-600 hover:bg-pink-700
      image: /img/evolverai-web-elysia-bg.jpg
      imagePosition: left
  - discriminant: cards
    value:
      id: courses
      title: Corsi e Formazione IA
      description: Migliorate le vostre competenze con i nostri corsi completi di IA e data science.
      cards:
        - title: Fondamentali IA
          description: Imparate le basi dell'intelligenza artificiale e le sue applicazioni.
          features:
            - text: Cos'è un LLM (Large Language Model)
              bullet: psychology
              bulletType: icon
              bulletColor: text-blue-400
              badges:
                - text: Nuovo
                  color: bg-blue-500
                  tooltip: Aggiunto di Recente
            - text: Concetti chiave nel prompt engineering
              bullet: edit
              bulletType: icon
              bulletColor: text-green-400
              badges:
                - text: Base
                  color: bg-green-500
                  tooltip: Concetto Base
            - text: IA generativa e le sue applicazioni
              bullet: auto_awesome
              bulletType: icon
              bulletColor: text-purple-400
              badges:
                - text: Popolare
                  color: bg-purple-500
                  tooltip: Argomento Più Popolare
          buttonText: Iscriviti ora
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-fundamentals
          buttonColor: bg-indigo-600 hover:bg-indigo-700
        - title: Padronanza Machine Learning
          description: Tecniche avanzate in machine learning e data science.
          features:
            - text: Deep learning e reti neurali
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Esperto
                  color: bg-green-400
                  tooltip: Badge Padronanza
            - text: Algoritmi avanzati e ottimizzazione del modello
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Esperto
                  color: bg-green-400
                  tooltip: Badge Padronanza
            - text: Implementazione di progetti del mondo reale
              bullet: ▶
              bulletType: symbol
              bulletColor: text-orange-400
              badges:
                - text: Esperto
                  color: bg-green-400
                  tooltip: Badge Padronanza
          buttonText: Iscriviti ora
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-machine-learning
        - title: Etica e Governance IA
          description: Comprendere le implicazioni etiche e la governance dei sistemi IA.
          features:
            - text: Framework etici per lo sviluppo IA
              bulletType: dot
              bulletColor: text-red-400
              badges:
                - text: Etica
                  color: bg-red-500
                  tooltip: Certificato Etico
            - text: Strategie di rilevamento e mitigazione dei bias
              bulletType: dot
              bulletColor: text-yellow-400
              badges:
                - text: Avanzato
                  color: bg-yellow-500
                  tooltip: Livello Avanzato
            - text: Conformità normativa e best practice
              bulletType: dot
              bulletColor: text-green-400
              badges:
                - text: Conformità
                  color: bg-green-500
                  tooltip: Pronto per la Conformità
          buttonText: Iscriviti ora
          icon:
            type: school
            alignment: left
          buttonUrl: /enroll/ai-ethics-governance
          badges:
            - text: 4 ore
              color: bg-red-500
              tooltip: Il tuo primo corso
      buttonUrl: /enroll/ai-fundamentals
      buttonColor: bg-indigo-600 hover:bg-indigo-700
      responsiveColumns:
        mobile: 1
        tablet: 3
        desktop: 3
      cardVariant: glass
  - discriminant: content_header
    value:
      id: contact
      title: Mettetevi in Contatto
      description: Pronti a trasformare la vostra azienda con l'IA? Discutiamo del vostro progetto.
      backgroundImage: /img/evolverai-web-contact-bg.jpg
      overlayOpacity: '0.1'
  - discriminant: blog
    value:
      id: blog
  - discriminant: testimonials
    value:
      id: '111'
      visible: false
  - discriminant: pricing
    value:
      id: ppp
