divisions:
  title: Our Divisions
  description: >
    EvolverAI is more than a company — it's a multidisciplinary ecosystem of innovation.  Our divisions span across
    cutting-edge technology, healthcare, hospitality, education,  digital design, and business services. Each unit
    operates with autonomy and focus,  yet shares the same commitment: using intelligence, creativity, and precision to
    build  the future. Explore how each division contributes to our unified mission.
  cards:
    - title: EvolverAI Tech
      description: >
        Our technology division is the core engine driving innovation at EvolverAI.  We specialize in custom software
        development, machine learning systems, data  engineering, and scalable AI platforms tailored to business needs.
        Whether it's  cloud infrastructure or advanced analytics, EvolverAI Tech turns complexity  into smart, usable
        solutions.
      linkText: Learn More
    - title: EvolverAI Medical
      description: >
        At the intersection of healthcare and artificial intelligence, EvolverAI Medical  is committed to improving
        lives. We develop diagnostic support systems, medical  data platforms, and patient-centric AI applications that
        enhance clinical decision-making,  research, and care delivery.
      linkText: Learn More
    - title: EvolverAI Hospitality
      description: >
        Merging technology with human experience, EvolverAI Hospitality brings intelligent  solutions to the hotel and
        leisure industry. From smart guest services and  reservation systems to operational automation and AI-enhanced
        customer experience —  we help hospitality providers stay ahead of the curve.
      linkText: Learn More
    - title: EvolverAI BPO
      description: >
        EvolverAI BPO (Business Process Outsourcing) delivers intelligent support  operations for companies worldwide.
        We combine automation, human expertise,  and scalable systems to streamline tasks like data management,
        customer  service, content moderation, and administrative workflows — with a strong  focus on efficiency and
        quality.
      linkText: Learn More
    - title: EvolverAI Academy
      description: >
        Education fuels progress. EvolverAI Academy offers high-impact courses,  workshops, and mentorship programs in
        AI, data science, and technology.  We empower individuals and organizations with practical skills to thrive  in
        a rapidly changing digital world — both online and in-person.
      linkText: Learn More
    - title: PixelCraft by EvolverAI
      description: >
        PixelCraft is our creative powerhouse — a design lab where art meets intelligence.  We craft AI-assisted
        illustrations, pixel art, branding kits, and visual content  for games, merch, and digital campaigns. The spirit
        is playful, but the execution  is professional.
      linkText: Learn More
