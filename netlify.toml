[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Language routing for unprefixed paths ("/", "/b2b", …) is handled server-side
# by the `lang-redirect` edge function. Netlify auto-discovers it from the default
# netlify/edge-functions/ directory; the routes it runs on are declared in-file via
# `export const config = { path: [...] }`. It detects the visitor's locale
# (cookie → Accept-Language → "en") and 302s to the localized URL. No SPA
# catch-all: unknown paths now serve the real 404 page.

# ── Cache headers ──────────────────────────────────────────────────────────

# Immutable cache for hashed assets (JS, CSS, fonts)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML pages (revalidate on each visit)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Medium cache for images
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

# Manifest and service worker — no cache
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers ───────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
