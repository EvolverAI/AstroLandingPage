<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EvolverAI Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0a0f1e}</style>
</head>
<body class="min-h-screen flex items-center justify-center text-gray-200 font-sans">
  <div class="w-full max-w-sm px-6">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black">Evolver<span class="text-blue-500">AI</span></h1>
      <p class="text-slate-400 text-sm mt-1">Admin Panel</p>
    </div>
    <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
      <h2 class="font-semibold mb-4">Sign in</h2>
      <div id="error" class="hidden mb-4 text-red-400 text-sm bg-red-900/30 border border-red-800 rounded-lg px-3 py-2"></div>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="text-xs text-slate-400 block mb-1">Admin Token</label>
          <input id="token" type="password" placeholder="Enter your admin token"
            class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:border-blue-500"
            autofocus />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-lg text-sm font-semibold transition">
          Sign In
        </button>
      </form>
      <p class="text-xs text-slate-600 mt-4 text-center">Token is set in <code class="text-slate-500">.env.local</code> as <code class="text-slate-500">ADMIN_TOKEN</code></p>
    </div>
  </div>

  <script>
    // If no ADMIN_TOKEN is configured on the server, skip auth entirely
    async function checkServerAuth() {
      try {
        const res = await fetch('/api/pages');
        if (res.status !== 401) {
          // Server has no auth — go straight to dashboard
          const dest = new URLSearchParams(location.search).get('next') || '/';
          location.href = dest;
        }
      } catch { /* server not running */ }
    }
    checkServerAuth();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = document.getElementById('token').value.trim();
      if (!token) return;

      // Test the token against the API
      const res = await fetch('/api/pages', {
        headers: { 'Authorization': 'Bearer ' + token }
      });

      if (res.ok) {
        sessionStorage.setItem('adminToken', token);
        const dest = new URLSearchParams(location.search).get('next') || '/';
        location.href = dest;
      } else {
        const err = document.getElementById('error');
        err.textContent = 'Invalid token. Check your .env.local ADMIN_TOKEN.';
        err.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
