<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translate — EvolverAI Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { background: #0f172a; }
    textarea { resize: vertical; }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-gray-200 min-h-screen font-sans">

<div x-data="translator()" x-init="init()" x-cloak>

  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-700 px-6 py-4 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-3">
      <a href="/" class="text-slate-400 hover:text-white text-sm">← Dashboard</a>
      <span class="text-slate-600">/</span>
      <span class="font-semibold capitalize" x-text="page"></span>
      <span class="text-slate-600">/</span>
      <span class="text-purple-400 text-sm">Translate</span>
    </div>
    <div class="flex items-center gap-3">
      <!-- Target language selector -->
      <select x-model="targetLang" @change="loadContent()"
        class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-purple-500">
        <template x-for="lang in nonEnglishLangs" :key="lang.code">
          <option :value="lang.code" x-text="`${lang.flag} ${lang.name}`"></option>
        </template>
      </select>
      <!-- Translate all button -->
      <button @click="translateAll()"
        class="bg-purple-600 hover:bg-purple-500 text-white text-sm px-4 py-1.5 rounded-lg transition flex items-center gap-2"
        :disabled="translatingAll">
        <span x-show="translatingAll" class="spin inline-block w-3 h-3 border-2 border-white border-t-transparent rounded-full"></span>
        <span x-show="!translatingAll">✦ Translate All</span>
        <span x-show="translatingAll">Translating...</span>
      </button>
    </div>
  </header>

  <!-- API key warning -->
  <div x-show="apiKeyMissing" class="max-w-4xl mx-auto px-6 pt-6">
    <div class="bg-yellow-900/40 border border-yellow-700 text-yellow-300 text-sm px-4 py-3 rounded-lg">
      ⚠️ OpenAI API key not configured. Add <code class="bg-yellow-900/50 px-1 rounded">OPENAI_API_KEY=sk-...</code> to <code class="bg-yellow-900/50 px-1 rounded">.env.local</code> in the project root.
    </div>
  </div>

  <!-- Loading -->
  <div x-show="loading" class="flex items-center justify-center h-64">
    <div class="text-slate-400">Loading...</div>
  </div>

  <!-- Column headers -->
  <div x-show="!loading" class="max-w-6xl mx-auto px-6 pt-6">
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="text-sm font-medium text-slate-300 flex items-center gap-2">
        🇺🇸 English <span class="text-slate-500">(master)</span>
      </div>
      <div class="text-sm font-medium text-slate-300 flex items-center gap-2">
        <span x-text="targetLangObj?.flag"></span>
        <span x-text="targetLangObj?.name"></span>
        <span class="text-slate-500 text-xs ml-1">(editable)</span>
      </div>
    </div>

    <!-- Global error/success -->
    <div x-show="globalError" class="mb-4 bg-red-900/40 border border-red-700 text-red-300 text-sm px-4 py-2 rounded-lg" x-text="globalError"></div>
    <div x-show="globalSuccess" class="mb-4 bg-green-900/40 border border-green-700 text-green-300 text-sm px-4 py-2 rounded-lg" x-text="globalSuccess"></div>

    <!-- Sections -->
    <template x-for="sectionKey in sectionKeys" :key="sectionKey">
      <div class="mb-4 rounded-xl overflow-hidden border border-slate-700">

        <!-- Section header -->
        <div class="flex items-center justify-between px-5 py-3 bg-slate-800 border-b border-slate-700">
          <div class="flex items-center gap-2">
            <button @click="toggleSection(sectionKey)" class="text-slate-400 hover:text-white">
              <span x-text="collapsed[sectionKey] ? '▶' : '▼'" class="text-xs"></span>
            </button>
            <span class="font-mono text-sm text-blue-300" x-text="sectionKey"></span>
            <!-- Status badge -->
            <span x-show="sectionStatus[sectionKey]"
              class="text-xs px-2 py-0.5 rounded-full"
              :class="{
                'bg-green-900/50 text-green-300': sectionStatus[sectionKey] === 'translated',
                'bg-yellow-900/50 text-yellow-300': sectionStatus[sectionKey] === 'pending',
              }"
              x-text="sectionStatus[sectionKey]">
            </span>
          </div>
          <div class="flex items-center gap-2">
            <button @click="saveSection(sectionKey)"
              class="text-xs bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded-lg transition"
              :disabled="saving[sectionKey]">
              <span x-show="!saving[sectionKey]">Save</span>
              <span x-show="saving[sectionKey]">Saving...</span>
            </button>
            <button @click="translateSection(sectionKey)"
              class="text-xs bg-purple-600 hover:bg-purple-500 text-white px-3 py-1 rounded-lg transition flex items-center gap-1"
              :disabled="translating[sectionKey]">
              <span x-show="translating[sectionKey]" class="spin inline-block w-3 h-3 border border-white border-t-transparent rounded-full"></span>
              <span x-show="!translating[sectionKey]">✦ Translate</span>
              <span x-show="translating[sectionKey]">...</span>
            </button>
          </div>
        </div>

        <!-- Side-by-side fields -->
        <div x-show="!collapsed[sectionKey]" class="bg-slate-900">
          <template x-for="fieldKey in getStringFields(sectionKey)" :key="fieldKey">
            <div class="grid grid-cols-2 gap-0 border-b border-slate-800 last:border-0">
              <!-- Label -->
              <div class="col-span-2 px-5 pt-3 pb-1">
                <span class="text-xs font-mono text-slate-500" x-text="fieldKey"></span>
              </div>
              <!-- EN source -->
              <div class="px-5 pb-3">
                <div class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-400 min-h-[2.5rem] whitespace-pre-wrap"
                  x-text="getNestedValue(masterContent[sectionKey], fieldKey)">
                </div>
              </div>
              <!-- Target editable -->
              <div class="px-5 pb-3">
                <textarea
                  :rows="(getNestedValue(masterContent[sectionKey], fieldKey) || '').length > 100 ? 4 : 2"
                  class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-500"
                  :value="getNestedValue(translationContent[sectionKey], fieldKey)"
                  @input="setNestedValue(sectionKey, fieldKey, $event.target.value)"
                ></textarea>
              </div>
            </div>
          </template>

          <!-- Cards -->
          <template x-if="masterContent[sectionKey]?.cards">
            <div>
              <template x-for="(card, ci) in masterContent[sectionKey].cards" :key="ci">
                <div class="border-b border-slate-800 last:border-0">
                  <div class="col-span-2 px-5 pt-3 pb-1">
                    <span class="text-xs font-mono text-slate-500">cards[<span x-text="ci"></span>]</span>
                  </div>
                  <template x-for="ck in getCardStringFields(sectionKey, ci)" :key="ck">
                    <div class="grid grid-cols-2 gap-0">
                      <div class="col-span-2 px-8 pt-2 pb-1">
                        <span class="text-xs font-mono text-slate-600" x-text="ck"></span>
                      </div>
                      <div class="px-8 pb-2">
                        <div class="bg-slate-800/50 border border-slate-700 rounded-lg px-3 py-2 text-xs text-slate-400 whitespace-pre-wrap"
                          x-text="masterContent[sectionKey].cards[ci][ck]">
                        </div>
                      </div>
                      <div class="px-8 pb-2">
                        <textarea
                          :rows="(masterContent[sectionKey].cards[ci][ck] || '').length > 80 ? 3 : 2"
                          class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-xs focus:outline-none focus:border-purple-500"
                          :value="translationContent[sectionKey]?.cards?.[ci]?.[ck] || ''"
                          @input="setCardValue(sectionKey, ci, ck, $event.target.value)"
                        ></textarea>
                      </div>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>
    </template>

    <div class="h-16"></div>
  </div>

</div>

<script>
function translator() {
  const params = new URLSearchParams(location.search);
  return {
    page: params.get('page') || 'home',
    targetLang: '',
    languages: [],
    masterContent: {},
    translationContent: {},
    sectionKeys: [],
    collapsed: {},
    translating: {},
    translatingAll: false,
    saving: {},
    sectionStatus: {},
    loading: true,
    apiKeyMissing: false,
    globalError: '',
    globalSuccess: '',

    get nonEnglishLangs() {
      return this.languages.filter(l => l.code !== 'en');
    },

    get targetLangObj() {
      return this.languages.find(l => l.code === this.targetLang);
    },

    async init() {
      const res = await fetch('/api/languages').then(r => r.json());
      this.languages = res.languages || [];
      const nonEn = this.languages.filter(l => l.code !== 'en');
      if (nonEn.length > 0) this.targetLang = nonEn[0].code;
      await this.loadContent();
    },

    async loadContent() {
      if (!this.targetLang) return;
      this.loading = true;
      this.globalError = '';
      this.globalSuccess = '';

      const [enRes, targetRes] = await Promise.all([
        fetch(`/api/content/${this.page}?lang=en`).then(r => r.json()),
        fetch(`/api/content/${this.page}?lang=${this.targetLang}`).then(r => r.json()),
      ]);

      this.masterContent = enRes.content || {};
      this.translationContent = JSON.parse(JSON.stringify(targetRes.content || {}));

      // Build section keys (skip meta)
      this.sectionKeys = Object.keys(this.masterContent).filter(k => k !== 'meta');
      this.loading = false;
    },

    getStringFields(sectionKey) {
      const section = this.masterContent[sectionKey];
      if (!section || typeof section !== 'object') return [];
      return Object.keys(section).filter(k => {
        if (k === 'cards') return false;
        return typeof section[k] === 'string';
      });
    },

    getCardStringFields(sectionKey, ci) {
      const card = this.masterContent[sectionKey]?.cards?.[ci];
      if (!card) return [];
      return Object.keys(card).filter(k => typeof card[k] === 'string');
    },

    getNestedValue(obj, key) {
      return obj?.[key] ?? '';
    },

    setNestedValue(sectionKey, fieldKey, value) {
      if (!this.translationContent[sectionKey]) {
        this.translationContent[sectionKey] = {};
      }
      this.translationContent[sectionKey][fieldKey] = value;
    },

    setCardValue(sectionKey, ci, ck, value) {
      if (!this.translationContent[sectionKey]) this.translationContent[sectionKey] = {};
      if (!this.translationContent[sectionKey].cards) {
        this.translationContent[sectionKey].cards = JSON.parse(
          JSON.stringify(this.masterContent[sectionKey]?.cards || [])
        );
      }
      if (!this.translationContent[sectionKey].cards[ci]) {
        this.translationContent[sectionKey].cards[ci] = {};
      }
      this.translationContent[sectionKey].cards[ci][ck] = value;
    },

    toggleSection(key) {
      this.collapsed[key] = !this.collapsed[key];
    },

    async translateSection(sectionKey) {
      this.translating[sectionKey] = true;
      this.globalError = '';
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: this.page, lang: this.targetLang, section: sectionKey }),
      }).then(r => r.json());

      this.translating[sectionKey] = false;

      if (res.error) {
        this.globalError = res.error;
        if (res.error.includes('OPENAI_API_KEY')) this.apiKeyMissing = true;
        return;
      }

      // Merge translated section into local state
      if (res.translated[sectionKey]) {
        this.translationContent[sectionKey] = res.translated[sectionKey];
      }
      this.sectionStatus[sectionKey] = 'translated';
    },

    async translateAll() {
      this.translatingAll = true;
      this.globalError = '';
      this.globalSuccess = '';
      const res = await fetch('/api/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: this.page, lang: this.targetLang }),
      }).then(r => r.json());

      this.translatingAll = false;

      if (res.error) {
        this.globalError = res.error;
        if (res.error.includes('OPENAI_API_KEY')) this.apiKeyMissing = true;
        return;
      }

      // Reload to show fresh translations
      await this.loadContent();
      this.globalSuccess = `✓ All sections translated to ${this.targetLangObj?.name}`;
      setTimeout(() => this.globalSuccess = '', 5000);
    },

    async saveSection(sectionKey) {
      this.saving[sectionKey] = true;
      const res = await fetch(`/api/content/${this.page}/section/${sectionKey}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lang: this.targetLang, data: this.translationContent[sectionKey] }),
      }).then(r => r.json());
      this.saving[sectionKey] = false;
      if (res.error) { this.globalError = res.error; return; }
      this.sectionStatus[sectionKey] = 'translated';
    },
  };
}
</script>
</body>
</html>
